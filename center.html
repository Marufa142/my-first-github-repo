<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>center flex-box</title>
    <style>
        .container{
            background-color: aquamarine;
            display: flex;
            justify-content: center;
            height: 800px;
            align-items: center;
            .box{
                background-color: blueviolet;
                font-size: 4em;
                height: 300px;
                width: 300px;
                display: flex;
                
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">box</div>
    </div>
</body>
</html>
